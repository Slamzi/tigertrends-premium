<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TigerTrends Final Boss</title>

<link rel="stylesheet" href="style.css" />

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
  <h1>TigerTrends</h1>
  <div>0693995730</div>
</nav>

<section class="hero">
  <div class="glass">
    <h2>Enter the Final Experience</h2>
    <p>A 3D-powered premium music universe</p>
    <button onclick="scrollToMusic()">Explore</button>
  </div>
</section>

<section id="music">
  <h2>🎧 Audio Experience</h2>

  <div class="player glass">
    <h3>Now Playing</h3>

    <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div class="controls">
      <button onclick="togglePlay()">Play / Pause</button>
      <input type="range" id="seek" value="0">
    </div>
  </div>
</section>

<section id="gallery">
  <h2>🌌 Visual World</h2>
  <div class="grid">
    <div class="card glass">
      <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30">
    </div>
    <div class="card glass">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    </div>
  </div>
</section>

<footer>
  © 2026 TigerTrends Final Boss
</footer>

<script src="app.js"></script>
</body>
</html>
