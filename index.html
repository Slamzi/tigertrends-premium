<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TigerTrends Elite Production</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(15px);
  z-index: 1000;
}

nav h1 {
  color: #ff7b00;
}

/* SECTIONS */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  padding: 100px;
}

.content {
  max-width: 500px;
}

h1 {
  font-size: 3rem;
}

.highlight {
  color: #ff7b00;
}

p {
  margin-top: 20px;
  opacity: 0.8;
}

/* CONTACT */
.contact {
  position: fixed;
  bottom: 30px;
  right: 30px;
  color: #ff7b00;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
  <h1>TigerTrends</h1>
  <div>0693995730</div>
</nav>

<section id="s1">
  <div class="content">
    <h1>Welcome to <span class="highlight">TigerTrends</span></h1>
    <p>Scroll to experience a cinematic 3D journey.</p>
  </div>
</section>

<section id="s2">
  <div class="content">
    <h1>Immersive Design</h1>
    <p>Camera transitions are controlled by scroll timelines.</p>
  </div>
</section>

<section id="s3">
  <div class="content">
    <h1>Production Ready</h1>
    <p>This structure scales like real-world studio websites.</p>
  </div>
</section>

<div class="contact">0693995730</div>

<!-- THREE + GSAP -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
/* =========================
   THREE.JS SETUP
========================= */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({
  canvas: document.querySelector("#bg"),
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

/* LIGHTS */
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

/* OBJECTS */
const geometry = new THREE.TorusKnotGeometry(1, 0.3, 150, 20);
const material = new THREE.MeshStandardMaterial({ color: 0xff7b00 });
const object = new THREE.Mesh(geometry, material);

scene.add(object);

/* SECOND OBJECT */
const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.6, 32, 32),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);

sphere.position.x = 2;
scene.add(sphere);

/* =========================
   GSAP + SCROLL
========================= */
gsap.registerPlugin(ScrollTrigger);

/* CAMERA TIMELINE */
gsap.timeline({
  scrollTrigger: {
    trigger: "body",
    start: "top top",
    end: "bottom bottom",
    scrub: true
  }
})
.to(camera.position, { z: 6 }, 0)
.to(camera.position, { y: -2 }, 0.3)
.to(camera.position, { z: 4 }, 0.6)
.to(camera.position, { y: -4 }, 0.8);

/* OBJECT ANIMATIONS */
gsap.timeline({
  scrollTrigger: {
    trigger: "#s2",
    start: "top center",
    scrub: true
  }
})
.to(object.rotation, { x: 2, y: 2 });

gsap.timeline({
  scrollTrigger: {
    trigger: "#s3",
    start: "top center",
    scrub: true
  }
})
.to(sphere.position, { x: -2 });

/* =========================
   RENDER LOOP
========================= */
function animate(){
  requestAnimationFrame(animate);

  object.rotation.x += 0.005;
  object.rotation.y += 0.005;

  sphere.rotation.y += 0.01;

  renderer.render(scene, camera);
}

animate();

/* RESIZE */
window.addEventListener("resize", ()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
